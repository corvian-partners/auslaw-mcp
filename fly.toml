# auslaw-mcp on Fly.io — Sydney region (clean ASN for AustLII Cloudflare gate).
#
# Rationale: Railway's Singapore pool is GCP (ASN 15169); Cloudflare's bot
# management challenges GCP egress regardless of TLS fingerprint. Fly.io has
# its own ASN and a real Sydney region, so AustLII's CF edge should let
# curl-impersonate traffic through.
#
# Private networking: cp-legal-mcp talks to this service via Fly's 6PN
# ("<app>.internal"), so no public port is needed for the MCP transport.
# The /diag/egress and /health endpoints share the same HTTP listener; keep
# [http_service] while migrating so you can curl diagnostics from your
# laptop, then remove it once cp-legal-mcp is the only caller.

app = "auslaw-mcp"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  MCP_TRANSPORT = "http"
  PORT = "3000"
  LOG_LEVEL = "1"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 40

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"  # Tesseract OCR spikes ~300–500 MB on scanned PDFs; 512mb OOMs.
