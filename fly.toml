# fly.toml app configuration file generated for auslaw-mcp on 2026-04-24T06:28:30Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'auslaw-mcp'
primary_region = 'syd'

[build]
  dockerfile = 'Dockerfile'

[env]
  LOG_LEVEL = '1'
  MCP_TRANSPORT = 'http'
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 40

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'get'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
